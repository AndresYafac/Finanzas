<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinTrack sin conexión</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { min-height: 100vh; display: grid; place-items: center; padding: 24px; font-family: Arial, sans-serif; color: #0f1923; background: linear-gradient(135deg, #0f1923, #173247); }
      .card { width: min(420px, 100%); padding: 32px; border-radius: 28px; background: #fff; box-shadow: 0 24px 60px rgba(0,0,0,.25); text-align: center; }
      .icon { width: 72px; height: 72px; margin: 0 auto 18px; display: grid; place-items: center; border-radius: 22px; background: #1d9e75; color: #fff; font-weight: 900; font-size: 24px; }
      h1 { font-size: 24px; margin-bottom: 10px; }
      p { color: #60758a; line-height: 1.45; margin-bottom: 20px; }
      button { min-height: 44px; padding: 0 18px; border: 0; border-radius: 14px; background: #1d9e75; color: #fff; font-weight: 800; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon">FT</div>
      <h1>Sin conexión</h1>
      <p>No pudimos conectar con internet. Revisa tu conexión y vuelve a intentarlo.</p>
      <button onclick="location.reload()">Reintentar</button>
    </main>
  </body>
</html>
